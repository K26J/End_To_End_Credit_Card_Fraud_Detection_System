stages:
  data_ingestion:
    cmd: python src/DataIngestion.py
    deps:
      - src/DataIngestion.py
    outs:
      - data/raw_data.csv

  data_splitting:
    cmd: python src/DataSplit.py
    deps:
      - src/DataSplit.py
      - data/raw_data.csv
    outs:
      - data/train_data.csv
      - data/test_data.csv
      
  data_preprocessing:
    cmd: python src/DataFeatureEngineering.py
    deps:
      - src/DataFeatureEngineering.py
      - data/train_data.csv
      - data/test_data.csv
    outs:
      - data/train_data_scaled.csv
      - data/test_data_scaled.csv

  model_training:
    cmd: python src/Model.py
    deps:
      - src/Model.py
      - data/train_data_scaled.csv
    params:
      - experiment_name
      - ${experiment_name}  # <-- DVC dynamically tracks only the active model's params!
    outs:
      - models/${experiment_name}.h5  # <-- DVC dynamically expects only the active model's file!

  model_evaluation:
    cmd: python src/ModelEvaluation.py
    deps:
      - src/ModelEvaluation.py
      - data/test_data_scaled.csv
      - models/baseline_model.h5
      - models/generalized_base_model.h5
      - models/class_weights_model.h5
      - models/custom_class_weights_model.h5
      - models/controlled_class_weights_model.h5
      - models/final_model.h5
    params:
      - experiment_name
    outs:
      - reports/baseline_model_metrics.json
      - reports/generalized_base_model_metrics.json
      - reports/class_weights_model_metrics.json
      - reports/custom_class_weights_model_metrics.json
      - reports/controlled_class_weights_model_metrics.json
      - reports/final_model_metrics.json